<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        /* ОСНОВНЫЕ НАСТРОЙКИ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fbc2c2 0%, #f8e0e0 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 16px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* КОНТЕЙНЕР ДЛЯ СЕРДЕЧЕК */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            overflow: hidden;
        }

        /* САМИ СЕРДЕЧКИ */
        .heart {
            position: absolute;
            color: rgba(255, 100, 150, 0.4);
            font-size: 1.5rem;
            user-select: none;
            animation: fall linear forwards;
            top: -10%;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* КОНТЕНТ */
        .content {
            max-width: 450px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 20px;
            animation: appear 1.2s ease-out;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ЗАГОЛОВОК */
        h1 {
            font-size: 3rem;
            font-weight: normal;
            color: #b3426f;
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            0% { text-shadow: 2px 2px 0 #ffd9e2; }
            100% { text-shadow: 4px 4px 0 #ffb6c1; }
        }

        /* БУКЕТ ИЗ ПРОСТЫХ ФИГУР */
        .bouquet {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 25px;
            flex-wrap: wrap;
        }

        .shape {
            font-size: 2.5rem;
            opacity: 0;
            transform: scale(0);
            animation: shapePop 0.4s ease-out forwards;
        }

        .shape:nth-child(1) { animation-delay: 0.1s; }
        .shape:nth-child(2) { animation-delay: 0.3s; }
        .shape:nth-child(3) { animation-delay: 0.5s; }
        .shape:nth-child(4) { animation-delay: 0.7s; }
        .shape:nth-child(5) { animation-delay: 0.9s; }
        .shape:nth-child(6) { animation-delay: 1.1s; }
        .shape:nth-child(7) { animation-delay: 1.3s; }
        .shape:nth-child(8) { animation-delay: 1.5s; }

        @keyframes shapePop {
            0% { opacity: 0; transform: scale(0) rotate(-10deg); }
            70% { transform: scale(1.1) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* ТЕКСТ ПОЗДРАВЛЕНИЯ */
        .greeting {
            font-size: 1.4rem;
            color: #4a2c3a;
            line-height: 1.8;
            margin: 25px 0 25px;
            padding: 10px;
            white-space: pre-line;
            font-style: italic;
            /* НИКАКОГО ФОНА, ТОЛЬКО ТЕКСТ */
            background: none;
            border: none;
            box-shadow: none;
        }

        /* КАРТИНКА/ГИФКА */
        .image-container {
            margin: 20px 0 20px;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.7);
            padding: 5px;
            background: none;
        }

        .image-container img {
            width: 100%;
            height: auto;
            border-radius: 25px;
            display: block;
        }

        /* ПОДПИСЬ */
        .signature {
            margin-top: 20px;
            font-size: 1.3rem;
            color: #9f5f7a;
            font-style: italic;
            padding: 10px;
            /* БЕЗ ФОНА */
            background: none;
            border: none;
        }

        /* МАЛЕНЬКИЙ ЭКРАН */
        @media (max-width: 420px) {
            h1 { font-size: 2.5rem; }
            .greeting { font-size: 1.2rem; }
            .shape { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="content">
        <h1>8 МАРТА</h1>
        
        <!-- БУКЕТ ИЗ ПРОСТЫХ ФИГУР (появляются по очереди) -->
        <div class="bouquet">
            <span class="shape">✦</span>
            <span class="shape">✧</span>
            <span class="shape">❀</span>
            <span class="shape">✿</span>
            <span class="shape">❁</span>
            <span class="shape">✾</span>
            <span class="shape">✽</span>
            <span class="shape">✼</span>
        </div>
        
        <!-- ТВОЙ ТЕКСТ -->
        <div class="greeting">
            Этомо дүктем — дуга меда,<br>
            Маша!<br>
            <br>
            С праздником весны! Желаю тебе счастья,<br>
            здоровья и только ярких дней. Ты — самая<br>
            лучшая!
        </div>

        <!-- ГИФКА (замени ссылку если надо) -->
        <div class="image-container">
            <img src="https://media.tenor.com/IhGXwIB8R3MAAAAi/cute-rose.gif" alt="цветы">
        </div>

        <!-- ПОДПИСЬ -->
        <div class="signature">
            ❤️ С любовью ❤️
        </div>
    </div>

    <script>
        // ФУНКЦИЯ ДЛЯ СЕРДЕЧЕК
        function startHearts() {
            const container = document.getElementById('heartsContainer');
            if (!container) return;
            
            const symbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤍'];
            
            function createHeart() {
                const heart = document.createElement('div');
                heart.className = 'heart';
                
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                
                const size = 0.8 + Math.random() * 1.5;
                heart.style.fontSize = size + 'rem';
                
                const duration = 4 + Math.random() * 6;
                heart.style.animationDuration = duration + 's';
                
                heart.style.animationDelay = Math.random() * 2 + 's';
                
                container.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, duration * 1000 + 500);
            }
            
            // Запускаем
            for (let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 100);
            }
            
            setInterval(createHeart, 300);
        }

        window.onload = startHearts;
    </script>
</body>
</html>
