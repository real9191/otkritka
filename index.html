<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, Маша!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffc3d0 0%, #ffd9b0 100%);
            font-family: 'Georgia', 'Times New Roman', 'Playfair Display', serif;
            padding: 16px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Контейнер для сердечек */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        /* Сердечки */
        .heart {
            position: absolute;
            color: rgba(255, 70, 120, 0.5);
            font-size: 1.5rem;
            user-select: none;
            white-space: nowrap;
            animation: fall linear forwards;
            top: -10%;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(120vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Контент */
        .content {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 30px 20px;
            animation: contentAppear 1.5s ease-out;
        }

        @keyframes contentAppear {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Заголовок */
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 4px 4px 0 #ff6b8b, 6px 6px 0 rgba(0,0,0,0.1);
            margin-bottom: 20px;
            letter-spacing: 3px;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 4px 4px 0 #ff6b8b, 6px 6px 0 rgba(0,0,0,0.1); }
            100% { text-shadow: 6px 6px 0 #ff4d6d, 8px 8px 0 rgba(0,0,0,0.2); }
        }

        /* Букет с поэтапным появлением */
        .bouquet {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 30px;
            flex-wrap: wrap;
            min-height: 80px;
        }

        .flower {
            font-size: 2.8rem;
            filter: drop-shadow(0 8px 5px rgba(255, 80, 130, 0.4));
            animation: flowerWave 2.5s infinite alternate ease-in-out;
            transform-origin: bottom;
            opacity: 0;
        }

        /* Появляются по очереди */
        .flower:nth-child(1) { animation: flowerAppear 0.6s ease-out forwards, flowerWave 2.5s infinite alternate ease-in-out 0.6s; }
        .flower:nth-child(2) { animation: flowerAppear 0.6s ease-out 0.2s forwards, flowerWave 2.5s infinite alternate ease-in-out 0.8s; }
        .flower:nth-child(3) { animation: flowerAppear 0.6s ease-out 0.4s forwards, flowerWave 2.5s infinite alternate ease-in-out 1.0s; }
        .flower:nth-child(4) { animation: flowerAppear 0.6s ease-out 0.6s forwards, flowerWave 2.5s infinite alternate ease-in-out 1.2s; }
        .flower:nth-child(5) { animation: flowerAppear 0.6s ease-out 0.8s forwards, flowerWave 2.5s infinite alternate ease-in-out 1.4s; }
        .flower:nth-child(6) { animation: flowerAppear 0.6s ease-out 1.0s forwards, flowerWave 2.5s infinite alternate ease-in-out 1.6s; }

        @keyframes flowerAppear {
            0% { opacity: 0; transform: translateY(20px) scale(0.5); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes flowerWave {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        /* Текст поздравления */
        .greeting {
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 0 #ff5a7a, 3px 3px 0 rgba(0,0,0,0.2);
            padding: 20px 15px;
            margin: 20px 0 30px;
            line-height: 1.7;
            white-space: pre-line;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
            animation: textGlow 3s infinite alternate;
            background: none;
            border: none;
            backdrop-filter: none;
        }

        @keyframes textGlow {
            0% { text-shadow: 2px 2px 0 #ff5a7a, 3px 3px 0 rgba(0,0,0,0.2); }
            100% { text-shadow: 3px 3px 0 #ff3b5c, 4px 4px 0 rgba(0,0,0,0.3); }
        }

        /* Гифка */
        .gif-container {
            margin: 25px 0 25px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 30px -10px rgba(255, 60, 120, 0.5);
            border: 4px solid rgba(255, 255, 255, 0.8);
            padding: 8px;
            background: none;
            animation: gifPulse 4s infinite ease-in-out;
        }

        @keyframes gifPulse {
            0% { transform: scale(1); box-shadow: 0 20px 30px -10px rgba(255, 60, 120, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 25px 35px -8px rgba(255, 30, 100, 0.7); }
            100% { transform: scale(1); box-shadow: 0 20px 30px -10px rgba(255, 60, 120, 0.5); }
        }

        .gif-container img {
            width: 100%;
            height: auto;
            border-radius: 32px;
            display: block;
        }

        /* Подпись */
        .signature {
            margin-top: 30px;
            font-size: 1.6rem;
            color: white;
            text-shadow: 2px 2px 0 #ff4d6d;
            font-style: italic;
            padding: 10px 20px;
            display: inline-block;
            background: none;
            border: none;
            animation: signatureFloat 3s infinite ease-in-out;
        }

        @keyframes signatureFloat {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 420px) {
            h1 { font-size: 2.8rem; }
            .greeting { font-size: 1.3rem; }
            .flower { font-size: 2.4rem; }
            .bouquet { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="heartsContainer"></div>

    <div class="content">
        <h1>8 МАРТА</h1>
        
        <!-- Букет с анимацией появления -->
        <div class="bouquet">
            <span class="flower">🌷</span>
            <span class="flower">🌹</span>
            <span class="flower">🌸</span>
            <span class="flower">🌺</span>
            <span class="flower">🌼</span>
            <span class="flower">🌻</span>
        </div>
        
        <!-- Твоё поздравление -->
        <div class="greeting">
            Этомо дүктем — дуга меда,<br>
            Маша!<br>
            <br>
            С праздником весны! Желаю тебе счастья,<br>
            здоровья и только ярких дней. Ты — самая<br>
            лучшая!
        </div>

        <!-- Гифка -->
        <div class="gif-container">
            <img src="https://media.tenor.com/IhGXwIB8R3MAAAAi/cute-rose.gif" alt="Милые цветы">
        </div>

        <!-- Подпись -->
        <div class="signature">
            ❤️ С любовью ❤️
        </div>
    </div>

    <script>
        function startHearts() {
            const container = document.getElementById('heartsContainer');
            if (!container) return;
            
            // Красивые символы для сердечек
            const symbols = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🤍', '♥️', '💖', '💗', '💓', '💕', '💞', '💘'];
            
            function createHeart() {
                const heart = document.createElement('div');
                heart.className = 'heart';
                
                // Случайный символ
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Случайная позиция слева
                heart.style.left = Math.random() * 100 + '%';
                
                // Случайный размер
                const size = 0.8 + Math.random() * 1.8;
                heart.style.fontSize = size + 'rem';
                
                // Случайная продолжительность падения
                const duration = 5 + Math.random() * 7;
                heart.style.animationDuration = duration + 's';
                
                // Случайная задержка
                heart.style.animationDelay = Math.random() * 3 + 's';
                
                // Случайная прозрачность
                heart.style.opacity = 0.3 + Math.random() * 0.4;
                
                container.appendChild(heart);
                
                // Удаляем сердечко после окончания анимации
                setTimeout(() => {
                    if (heart.parentNode) {
                        heart.remove();
                    }
                }, duration * 1000 + 500);
            }
            
            // Создаем 20 сердечек сразу для старта
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 150);
            }
            
            // Создаем новые сердечки каждые 250мс (непрерывно)
            setInterval(createHeart, 250);
        }

        // Запускаем после полной загрузки страницы
        window.addEventListener('load', startHearts);
    </script>
</body>
</html>
