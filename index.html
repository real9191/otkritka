<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>С 8 Марта, Маша!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black;
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Псевдоэлемент для плавной смены фона (круг от центра) */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle at 30% 30%, #fbc2c2, #f8e0e0);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            transition: width 1.8s cubic-bezier(0.4, 0, 0.2, 1), height 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.circle-bg::before {
            width: 300vmax;
            height: 300vmax;
        }

        /* Падающие цветочки (задний план) */
        .falling-flowers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .falling-flower {
            position: absolute;
            width: 30px;
            height: 50px;
            top: -60px;
            opacity: 0.4;
        }

        .falling-flower .stem {
            position: absolute;
            bottom: 0;
            left: 14px;
            width: 2px;
            height: 35px;
            background: linear-gradient(to top, #3a7d3a, #6a9e6a);
            border-radius: 1px;
        }

        .falling-flower .blossom {
            position: absolute;
            top: 0;
            left: 8px;
            width: 16px;
            height: 16px;
            background: #d96c9e;
            border-radius: 50%;
            box-shadow: 
                0 0 0 2px rgba(220, 90, 140, 0.8),
                8px 4px 0 -2px #e89bbf,
                -8px 4px 0 -2px #e89bbf,
                4px 8px 0 -2px #e89bbf,
                -4px 8px 0 -2px #e89bbf;
        }

        .falling-flower .leaf {
            position: absolute;
            width: 8px;
            height: 4px;
            background: #6a9e6a;
            border-radius: 50% 0 50% 0;
            transform-origin: left center;
        }

        .falling-flower .leaf1 {
            bottom: 18px;
            left: 10px;
            transform: rotate(-20deg);
        }

        .falling-flower .leaf2 {
            bottom: 8px;
            left: 14px;
            transform: rotate(15deg);
        }

        /* Контент (то, что будет скроллиться) */
        .content {
            position: relative;
            z-index: 20;
            min-height: 200vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15vh;
        }

        /* БУКЕТ — стебли перекрываются, как настоящий букет */
        .bouquet {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 250px;
            margin-bottom: 30px;
            z-index: 30;
        }

        .bouquet-flower {
            position: absolute;
            bottom: 0;
            width: 80px;
            height: 200px;
            transform-origin: bottom center;
        }

        /* Разное положение, высота и наклон, чтобы стебли перекрывались */
        .bf1 { left: 15%; bottom: -5px; transform: rotate(-4deg); height: 180px; z-index: 1; }
        .bf2 { left: 30%; bottom: 10px; transform: rotate(3deg); height: 210px; z-index: 2; }
        .bf3 { left: 45%; bottom: 0px; transform: rotate(-2deg); height: 190px; z-index: 3; }
        .bf4 { left: 60%; bottom: 15px; transform: rotate(5deg); height: 200px; z-index: 2; }
        .bf5 { left: 75%; bottom: -10px; transform: rotate(-6deg); height: 170px; z-index: 1; }

        /* Стебель */
        .bouquet-stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 0;
            background: linear-gradient(to top, #2e7d32, #6a9e6a);
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 8px #a5d6a5;
            animation: growStem 0.8s ease-out forwards;
        }

        @keyframes growStem {
            0% { height: 0; }
            100% { height: 100%; } /* Высота задаётся родителем */
        }

        /* Сердцевина */
        .bouquet-center {
            position: absolute;
            bottom: calc(100% - 20px); /* примерно на верхушке стебля */
            left: 50%;
            transform: translate(-50%, 0) scale(0);
            width: 24px;
            height: 24px;
            background: #ffcc80;
            border-radius: 50%;
            box-shadow: 0 0 0 3px #ffb74d, 0 0 12px #ffb74d;
            animation: popCenter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 2;
        }

        @keyframes popCenter {
            0% { transform: translate(-50%, 0) scale(0); }
            70% { transform: translate(-50%, 0) scale(1.2); }
            100% { transform: translate(-50%, 0) scale(1); }
        }

        /* Лепестки — теперь их 5 на цветок, собраны вокруг сердцевины */
        .petal {
            position: absolute;
            bottom: calc(100% - 20px); /* там же, где сердцевина */
            left: 50%;
            width: 20px;
            height: 30px;
            background: radial-gradient(ellipse at 50% 30%, #f8bbd0, #f48fb1);
            border-radius: 50% 50% 0 0;
            transform-origin: bottom center;
            opacity: 0;
            animation: petalPop 0.4s ease-out forwards;
            z-index: 1;
        }

        @keyframes petalPop {
            0% { opacity: 0; transform: rotate(0deg) scale(0); }
            70% { opacity: 1; transform: rotate(var(--rot)) scale(1.2); }
            100% { opacity: 1; transform: rotate(var(--rot)) scale(1); }
        }

        /* ЦЕНТРАЛЬНЫЙ БОЛЬШОЙ ЦВЕТОК — лепестки уменьшены, сердцевина крупная */
        .big-flower {
            position: relative;
            width: 90vw;
            max-width: 600px;
            aspect-ratio: 1/1;
            margin: 0 auto 50px;
            z-index: 25;
            opacity: 0;
            transform: scale(0);
            animation: bigFlowerAppear 2.2s ease-out forwards;
            animation-delay: 2.8s;
        }

        @keyframes bigFlowerAppear {
            0% { opacity: 0; transform: scale(0) rotate(0deg); }
            30% { opacity: 1; transform: scale(0.7) rotate(120deg); }
            60% { opacity: 1; transform: scale(1.1) rotate(240deg); }
            80% { opacity: 1; transform: scale(0.95) rotate(300deg); }
            100% { opacity: 1; transform: scale(1) rotate(360deg); }
        }

        /* Лепестки большого цветка — теперь они меньше */
        .big-petal {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25%;
            height: 35%;
            background: radial-gradient(ellipse at 50% 30%, #f9b8c4, #f06292);
            border-radius: 50% 50% 30% 30%;
            transform-origin: 50% 100%;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.5);
        }

        .big-petal1 { transform: translate(-50%, -100%) rotate(0deg); }
        .big-petal2 { transform: translate(-50%, -100%) rotate(45deg); }
        .big-petal3 { transform: translate(-50%, -100%) rotate(90deg); }
        .big-petal4 { transform: translate(-50%, -100%) rotate(135deg); }
        .big-petal5 { transform: translate(-50%, -100%) rotate(180deg); }
        .big-petal6 { transform: translate(-50%, -100%) rotate(225deg); }
        .big-petal7 { transform: translate(-50%, -100%) rotate(270deg); }
        .big-petal8 { transform: translate(-50%, -100%) rotate(315deg); }

        /* Сердцевина большого цветка — увеличенная, с текстом */
        .big-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 0 20px #f8bbd0, 0 0 35px white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2.2rem;
            color: #b3426f;
            font-weight: bold;
            line-height: 1.2;
            padding: 15px;
            opacity: 0;
            animation: centerFadeIn 0.6s 4s forwards;
        }

        @keyframes centerFadeIn {
            to { opacity: 1; }
        }

        /* Картинка под цветком (скролл) */
        .extra-image {
            width: 80%;
            max-width: 400px;
            margin: 40px auto;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 2rem;
            backdrop-filter: blur(2px);
            border: 2px dashed white;
        }

        @media (max-width: 500px) {
            .big-center { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <!-- Падающие цветочки -->
    <div class="falling-flowers" id="fallingFlowers"></div>

    <!-- Основной контент -->
    <div class="content">
        <!-- Букет из 5 цветков (стебли перекрываются) -->
        <div class="bouquet">
            <!-- Цветок 1 -->
            <div class="bouquet-flower bf1">
                <div class="bouquet-stem" style="animation-delay: 0.1s;"></div>
                <div class="bouquet-center" style="animation-delay: 0.5s;"></div>
                <div class="petal" style="--rot: -40deg; animation-delay: 0.9s;"></div>
                <div class="petal" style="--rot: 10deg; animation-delay: 1.0s;"></div>
                <div class="petal" style="--rot: 60deg; animation-delay: 1.1s;"></div>
                <div class="petal" style="--rot: 110deg; animation-delay: 1.2s;"></div>
                <div class="petal" style="--rot: 160deg; animation-delay: 1.3s;"></div>
            </div>
            <!-- Цветок 2 -->
            <div class="bouquet-flower bf2">
                <div class="bouquet-stem" style="animation-delay: 0.15s;"></div>
                <div class="bouquet-center" style="animation-delay: 0.6s;"></div>
                <div class="petal" style="--rot: -30deg; animation-delay: 1.0s;"></div>
                <div class="petal" style="--rot: 20deg; animation-delay: 1.1s;"></div>
                <div class="petal" style="--rot: 70deg; animation-delay: 1.2s;"></div>
                <div class="petal" style="--rot: 120deg; animation-delay: 1.3s;"></div>
                <div class="petal" style="--rot: 170deg; animation-delay: 1.4s;"></div>
            </div>
            <!-- Цветок 3 -->
            <div class="bouquet-flower bf3">
                <div class="bouquet-stem" style="animation-delay: 0.2s;"></div>
                <div class="bouquet-center" style="animation-delay: 0.7s;"></div>
                <div class="petal" style="--rot: -20deg; animation-delay: 1.1s;"></div>
                <div class="petal" style="--rot: 30deg; animation-delay: 1.2s;"></div>
                <div class="petal" style="--rot: 80deg; animation-delay: 1.3s;"></div>
                <div class="petal" style="--rot: 130deg; animation-delay: 1.4s;"></div>
                <div class="petal" style="--rot: 180deg; animation-delay: 1.5s;"></div>
            </div>
            <!-- Цветок 4 -->
            <div class="bouquet-flower bf4">
                <div class="bouquet-stem" style="animation-delay: 0.25s;"></div>
                <div class="bouquet-center" style="animation-delay: 0.8s;"></div>
                <div class="petal" style="--rot: -35deg; animation-delay: 1.2s;"></div>
                <div class="petal" style="--rot: 15deg; animation-delay: 1.3s;"></div>
                <div class="petal" style="--rot: 65deg; animation-delay: 1.4s;"></div>
                <div class="petal" style="--rot: 115deg; animation-delay: 1.5s;"></div>
                <div class="petal" style="--rot: 165deg; animation-delay: 1.6s;"></div>
            </div>
            <!-- Цветок 5 -->
            <div class="bouquet-flower bf5">
                <div class="bouquet-stem" style="animation-delay: 0.3s;"></div>
                <div class="bouquet-center" style="animation-delay: 0.9s;"></div>
                <div class="petal" style="--rot: -25deg; animation-delay: 1.3s;"></div>
                <div class="petal" style="--rot: 25deg; animation-delay: 1.4s;"></div>
                <div class="petal" style="--rot: 75deg; animation-delay: 1.5s;"></div>
                <div class="petal" style="--rot: 125deg; animation-delay: 1.6s;"></div>
                <div class="petal" style="--rot: 175deg; animation-delay: 1.7s;"></div>
            </div>
        </div>

        <!-- Большой центральный цветок с текстом -->
        <div class="big-flower">
            <div class="big-petal big-petal1"></div>
            <div class="big-petal big-petal2"></div>
            <div class="big-petal big-petal3"></div>
            <div class="big-petal big-petal4"></div>
            <div class="big-petal big-petal5"></div>
            <div class="big-petal big-petal6"></div>
            <div class="big-petal big-petal7"></div>
            <div class="big-petal big-petal8"></div>
            <div class="big-center">
                С 8 Марта,<br>Маша!
            </div>
        </div>

        <!-- Место для картинки (скролл) -->
        <div class="extra-image">
            🌸 Тут будет картинка 🌸
        </div>
    </div>

    <script>
        (function() {
            // 1. Падающие цветочки
            const container = document.getElementById('fallingFlowers');
            const count = 25;

            function createFallingFlower() {
                const flowerDiv = document.createElement('div');
                flowerDiv.className = 'falling-flower';

                const stem = document.createElement('div');
                stem.className = 'stem';
                const blossom = document.createElement('div');
                blossom.className = 'blossom';
                const leaf1 = document.createElement('div');
                leaf1.className = 'leaf leaf1';
                const leaf2 = document.createElement('div');
                leaf2.className = 'leaf leaf2';

                flowerDiv.appendChild(stem);
                flowerDiv.appendChild(blossom);
                flowerDiv.appendChild(leaf1);
                flowerDiv.appendChild(leaf2);

                container.appendChild(flowerDiv);

                const startX = Math.random() * 100;
                const scale = 0.6 + Math.random() * 0.8;
                const speed = 0.8 + Math.random() * 1.2;
                const rotateSpeed = 0.05 + Math.random() * 0.1;
                let direction = Math.random() > 0.5 ? 1 : -1;
                let rotation = 0;
                let posY = -100 - Math.random() * 200;

                flowerDiv.style.left = startX + '%';
                flowerDiv.style.transform = `scale(${scale})`;

                function animate() {
                    posY += speed;
                    rotation += rotateSpeed * direction;

                    if (rotation > 12) {
                        rotation = 12;
                        direction = -1;
                    } else if (rotation < -12) {
                        rotation = -12;
                        direction = 1;
                    }

                    flowerDiv.style.top = posY + 'px';
                    flowerDiv.style.transform = `scale(${scale}) rotate(${rotation}deg)`;

                    if (posY < window.innerHeight + 100) {
                        requestAnimationFrame(animate);
                    } else {
                        posY = -100 - Math.random() * 200;
                        flowerDiv.style.left = Math.random() * 100 + '%';
                        requestAnimationFrame(animate);
                    }
                }

                requestAnimationFrame(animate);
            }

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    createFallingFlower();
                }, i * 120);
            }

            // 2. Запуск смены фона через 2 секунды
            setTimeout(() => {
                document.body.classList.add('circle-bg');
            }, 2000);

            // 3. Приостанавливаем анимации букета до момента смены фона (чтобы они стартовали позже)
            const style = document.createElement('style');
            style.innerHTML = `
                .bouquet-stem, .bouquet-center, .petal {
                    animation-play-state: paused !important;
                }
            `;
            document.head.appendChild(style);

            setTimeout(() => {
                style.innerHTML = ''; // снимаем паузу
            }, 2500);
        })();
    </script>
</body>
</html>
