<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: black;
            position: relative;
            overflow: hidden;
        }

        .flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР ЦВЕТОЧКА */
        .flower-particle {
            position: absolute;
            width: 30px;
            height: 40px;
            top: -50px;
            transform-origin: center center;
        }

        /* СТЕБЕЛЬ (зеленый) */
        .flower-particle::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 14px;
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, #90ee90, #32cd32);
            border-radius: 1px;
            box-shadow: 0 0 4px #90ee90;
        }

        /* ЦВЕТОК (розовый/сиреневый) */
        .flower-particle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 8px;
            width: 14px;
            height: 14px;
            background: #ffb6c1;
            border-radius: 50%;
            box-shadow: 
                0 0 0 2px #ff69b4,
                8px 4px 0 -2px #ffb6c1,
                -8px 4px 0 -2px #ffb6c1,
                4px 8px 0 -2px #ffb6c1,
                -4px 8px 0 -2px #ffb6c1,
                0 0 8px #ff99cc;
        }
    </style>
</head>
<body>
    <div class="flowers-container" id="flowersContainer"></div>

    <script>
        function startFlowers() {
            const container = document.getElementById('flowersContainer');
            if (!container) return;

            function createFlower() {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                
                // Случайная позиция по горизонтали
                flower.style.left = Math.random() * 100 + '%';
                
                // Случайный размер (от 0.8 до 1.3)
                const scale = 0.8 + Math.random() * 0.5;
                flower.style.transform = `scale(${scale})`;
                
                // Случайный оттенок цветка
                const hue = 300 + Math.random() * 60; // розово-сиреневый
                flower.style.setProperty('--flower-hue', hue);
                
                container.appendChild(flower);
                
                // ПАДЕНИЕ
                let posY = -50;
                let rotation = 0;
                let rotationSpeed = 0.2 + Math.random() * 0.3; // скорость наклона
                let direction = Math.random() > 0.5 ? 1 : -1; // направление наклона
                const speed = 1.5 + Math.random() * 1.5; // скорость падения
                const startX = parseFloat(flower.style.left);
                
                function fall() {
                    posY += speed;
                    
                    // Меняем наклон (качается вправо-влево)
                    rotation += rotationSpeed * direction;
                    
                    // Меняем направление при достижении предела
                    if (rotation > 15) {
                        rotation = 15;
                        direction = -1;
                    } else if (rotation < -15) {
                        rotation = -15;
                        direction = 1;
                    }
                    
                    // Применяем трансформацию (поворот + масштаб)
                    flower.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
                    flower.style.top = posY + 'px';
                    
                    if (posY < window.innerHeight + 50) {
                        requestAnimationFrame(fall);
                    } else {
                        // Возвращаем наверх
                        posY = -50;
                        rotation = 0;
                        flower.style.left = Math.random() * 100 + '%';
                        requestAnimationFrame(fall);
                    }
                }
                
                requestAnimationFrame(fall);
            }
            
            // Создаем 40 цветочков
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    createFlower();
                }, i * 80);
            }
        }

        window.onload = startFlowers;
    </script>
</body>
</html>
