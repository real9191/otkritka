<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: black;
            position: relative;
            overflow: hidden;
        }

        /* ПСЕВДОЭЛЕМЕНТ ДЛЯ ПЛАВНОЙ СМЕНЫ ФОНА (КРУГ) */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, #fbc2c2 0%, #f8e0e0 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            transition: width 1.5s ease-out, height 1.5s ease-out;
        }

        body.circle-bg::before {
            width: 300vmax;
            height: 300vmax;
        }

        /* КОНТЕЙНЕР ДЛЯ ПАДАЮЩИХ ЦВЕТОЧКОВ (задний план) */
        .flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* ПАДАЮЩИЙ ЦВЕТОЧЕК (приглушённый) */
        .flower-particle {
            position: absolute;
            width: 30px;
            height: 40px;
            top: -50px;
            transform-origin: center center;
            opacity: 0.35;
        }

        .flower-particle::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 14px;
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, #90ee90, #32cd32);
            border-radius: 1px;
            box-shadow: 0 0 4px #90ee90;
            opacity: 0.5;
        }

        .flower-particle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 8px;
            width: 14px;
            height: 14px;
            background: #ffb6c1;
            border-radius: 50%;
            box-shadow: 
                0 0 0 2px #ff69b4,
                8px 4px 0 -2px #ffb6c1,
                -8px 4px 0 -2px #ffb6c1,
                4px 8px 0 -2px #ffb6c1,
                -4px 8px 0 -2px #ffb6c1,
                0 0 8px #ff99cc;
            opacity: 0.6;
        }

        /* ЦЕНТРАЛЬНЫЙ ЦВЕТОК (передний план) */
        .center-flower {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 200px;
            height: 200px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .center-flower.show {
            opacity: 1;
            animation: flowerAppear 2.5s ease-out forwards;
        }

        @keyframes flowerAppear {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(0deg);
            }
            30% {
                transform: translate(-50%, -50%) scale(0.6) rotate(180deg);
            }
            60% {
                transform: translate(-50%, -50%) scale(1.1) rotate(300deg);
            }
            80% {
                transform: translate(-50%, -50%) scale(0.95) rotate(340deg);
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(360deg);
            }
        }

        /* ЛЕПЕСТКИ */
        .petal {
            position: absolute;
            width: 60px;
            height: 100px;
            background: radial-gradient(ellipse at 50% 30%, #ffb6c1, #ff69b4 70%);
            border-radius: 50% / 40% 40% 60% 60%;
            top: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            box-shadow: 0 0 15px #ff99cc;
        }

        /* 8 лепестков */
        .petal1 { transform: translate(-50%, -100%) rotate(0deg); }
        .petal2 { transform: translate(-50%, -100%) rotate(45deg); }
        .petal3 { transform: translate(-50%, -100%) rotate(90deg); }
        .petal4 { transform: translate(-50%, -100%) rotate(135deg); }
        .petal5 { transform: translate(-50%, -100%) rotate(180deg); }
        .petal6 { transform: translate(-50%, -100%) rotate(225deg); }
        .petal7 { transform: translate(-50%, -100%) rotate(270deg); }
        .petal8 { transform: translate(-50%, -100%) rotate(315deg); }

        /* ЦЕНТР ЦВЕТКА (место для текста) */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            box-shadow: inset 0 0 10px #ffb6c1, 0 0 20px white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b3426f;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            padding: 5px;
            opacity: 0;
            animation: centerAppear 0.5s 2.2s forwards;
        }

        @keyframes centerAppear {
            to { opacity: 1; }
        }

        /* ТЕКСТ ВНУТРИ ЦВЕТКА (пока просто пример) */
        .center-circle span {
            display: block;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>
    <!-- КОНТЕЙНЕР ДЛЯ ПАДАЮЩИХ ЦВЕТОЧКОВ -->
    <div class="flowers-container" id="flowersContainer"></div>

    <!-- ЦЕНТРАЛЬНЫЙ ЦВЕТОК -->
    <div class="center-flower" id="centerFlower">
        <!-- ЛЕПЕСТКИ -->
        <div class="petal petal1"></div>
        <div class="petal petal2"></div>
        <div class="petal petal3"></div>
        <div class="petal petal4"></div>
        <div class="petal petal5"></div>
        <div class="petal petal6"></div>
        <div class="petal petal7"></div>
        <div class="petal petal8"></div>

        <!-- ЦЕНТР ДЛЯ ТЕКСТА -->
        <div class="center-circle" id="flowerCenter">
            <span>ПОЗДРАВЛЕНИЕ</span>
        </div>
    </div>

    <script>
        // ЗАПУСКАЕМ ПАДАЮЩИЕ ЦВЕТОЧКИ (чуть больше)
        function startFlowers() {
            const container = document.getElementById('flowersContainer');
            if (!container) return;

            // 25 цветочков
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    createFlower();
                }, i * 150); // интервал чуть меньше, чтобы чаще
            }

            function createFlower() {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                
                flower.style.left = (5 + Math.random() * 90) + '%';
                const scale = 0.7 + Math.random() * 0.6;
                flower.style.transform = `scale(${scale})`;
                
                container.appendChild(flower);
                
                let posY = -50 - Math.random() * 400; // разброс по высоте
                let rotation = 0;
                let rotationSpeed = 0.15 + Math.random() * 0.25;
                let direction = Math.random() > 0.5 ? 1 : -1;
                const speed = 1.2 + Math.random() * 1.3;
                
                function fall() {
                    posY += speed;
                    
                    rotation += rotationSpeed * direction;
                    
                    if (rotation > 12) {
                        rotation = 12;
                        direction = -1;
                    } else if (rotation < -12) {
                        rotation = -12;
                        direction = 1;
                    }
                    
                    flower.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
                    flower.style.top = posY + 'px';
                    
                    if (posY < window.innerHeight + 50) {
                        requestAnimationFrame(fall);
                    } else {
                        posY = -50 - Math.random() * 300;
                        flower.style.left = (5 + Math.random() * 90) + '%';
                        requestAnimationFrame(fall);
                    }
                }
                
                requestAnimationFrame(fall);
            }
        }

        // ЧЕРЕЗ 3 СЕКУНДЫ ПОКАЗЫВАЕМ ЦЕНТРАЛЬНЫЙ ЦВЕТОК
        setTimeout(() => {
            const centerFlower = document.getElementById('centerFlower');
            centerFlower.classList.add('show');
            
            // ЧЕРЕЗ 2.5 СЕК (КОГДА ЦВЕТОК ПЕРЕСТАЕТ КРУТИТЬСЯ) ЗАПУСКАЕМ ПЕРЕХОД ФОНА
            setTimeout(() => {
                document.body.classList.add('circle-bg');
            }, 2500);
            
        }, 3000);

        window.onload = startFlowers;
    </script>
</body>
</html>
