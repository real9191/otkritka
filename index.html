<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: black;
            position: relative;
            overflow: hidden;
        }

        .flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flower-particle {
            position: absolute;
            width: 30px;
            height: 40px;
            top: -50px;
            transform-origin: center center;
            opacity: 0.9;
        }

        /* СТЕБЕЛЬ */
        .flower-particle::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 14px;
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, #90ee90, #32cd32);
            border-radius: 1px;
            box-shadow: 0 0 4px #90ee90;
        }

        /* ЦВЕТОК */
        .flower-particle::after {
            content: '';
            position: absolute;
            top: 0;
            left: 8px;
            width: 14px;
            height: 14px;
            background: #ffb6c1;
            border-radius: 50%;
            box-shadow: 
                0 0 0 2px #ff69b4,
                8px 4px 0 -2px #ffb6c1,
                -8px 4px 0 -2px #ffb6c1,
                4px 8px 0 -2px #ffb6c1,
                -4px 8px 0 -2px #ffb6c1,
                0 0 8px #ff99cc;
        }
    </style>
</head>
<body>
    <div class="flowers-container" id="flowersContainer"></div>

    <script>
        function startFlowers() {
            const container = document.getElementById('flowersContainer');
            if (!container) return;

            // СОЗДАЕМ 15 ЦВЕТОЧКОВ РАВНОМЕРНО
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createFlower(i);
                }, i * 200); // Каждый новый цветочек через 200мс
            }

            function createFlower(index) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                
                // Случайная позиция по горизонтали (равномерно распределяем)
                flower.style.left = (5 + Math.random() * 90) + '%';
                
                // Случайный размер
                const scale = 0.7 + Math.random() * 0.6;
                flower.style.transform = `scale(${scale})`;
                
                container.appendChild(flower);
                
                // КАЖДЫЙ ЦВЕТОЧЕК НАЧИНАЕТ С РАЗНОЙ ВЫСОТЫ
                // чтобы не было кучками
                let posY = -50 - Math.random() * 300; // Разный старт
                let rotation = 0;
                let rotationSpeed = 0.15 + Math.random() * 0.25;
                let direction = Math.random() > 0.5 ? 1 : -1;
                const speed = 1.2 + Math.random() * 1.3;
                const startX = parseFloat(flower.style.left);
                
                function fall() {
                    posY += speed;
                    
                    rotation += rotationSpeed * direction;
                    
                    if (rotation > 12) {
                        rotation = 12;
                        direction = -1;
                    } else if (rotation < -12) {
                        rotation = -12;
                        direction = 1;
                    }
                    
                    flower.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
                    flower.style.top = posY + 'px';
                    
                    if (posY < window.innerHeight + 50) {
                        requestAnimationFrame(fall);
                    } else {
                        // Вернулся наверх — даём новую позицию по горизонтали
                        posY = -50 - Math.random() * 200;
                        flower.style.left = (5 + Math.random() * 90) + '%';
                        requestAnimationFrame(fall);
                    }
                }
                
                requestAnimationFrame(fall);
            }
        }

        window.onload = startFlowers;
    </script>
</body>
</html>
